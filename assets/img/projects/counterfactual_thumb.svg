<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" width="400" height="300">
  <rect width="400" height="300" fill="#0a1628"/>
  <!-- Real video panel -->
  <rect x="20" y="40" width="110" height="80" rx="5" fill="#1a3a5c" stroke="#4a90d9" stroke-width="1.5"/>
  <text x="75" y="62" font-family="monospace" font-size="9" fill="#7ec8e3" text-anchor="middle">Real Video</text>
  <ellipse cx="60" cy="100" rx="18" ry="12" fill="#2e86ab" opacity="0.6"/>
  <ellipse cx="100" cy="95" rx="12" ry="8" fill="#e74c3c" opacity="0.5"/>
  <!-- Digital twin panel -->
  <rect x="145" y="35" width="110" height="90" rx="5" fill="#0d3320" stroke="#27ae60" stroke-width="1.5"/>
  <text x="200" y="57" font-family="monospace" font-size="9" fill="#58d68d" text-anchor="middle">Digital Twin</text>
  <polygon points="160,95 200,80 230,92 190,107" fill="none" stroke="#27ae60" stroke-width="1.2"/>
  <line x1="160" y1="95" x2="160" y2="115" stroke="#27ae60" stroke-width="1.2"/>
  <line x1="200" y1="80" x2="200" y2="100" stroke="#27ae60" stroke-width="1.2" opacity="0.5"/>
  <line x1="230" y1="92" x2="230" y2="112" stroke="#27ae60" stroke-width="1.2"/>
  <polygon points="160,115 200,100 230,112 190,127" fill="none" stroke="#27ae60" stroke-width="1.2"/>
  <!-- Arrow -->
  <line x1="258" y1="80" x2="272" y2="80" stroke="#ccc" stroke-width="2"/>
  <polygon points="269,75 278,80 269,85" fill="#ccc"/>
  <!-- Counterfactual output -->
  <rect x="278" y="40" width="110" height="80" rx="5" fill="#3d0d0d" stroke="#e74c3c" stroke-width="1.5"/>
  <text x="333" y="62" font-family="monospace" font-size="9" fill="#f1948a" text-anchor="middle">Counterfactual</text>
  <ellipse cx="308" cy="100" rx="18" ry="12" fill="#e74c3c" opacity="0.4"/>
  <ellipse cx="355" cy="93" rx="12" ry="8" fill="#e74c3c" opacity="0.75"/>
  <!-- Title bar -->
  <rect x="0" y="255" width="400" height="45" fill="rgba(0,0,0,0.7)"/>
  <text x="200" y="277" font-family="Georgia, serif" font-size="14" fill="white" text-anchor="middle" font-weight="bold">Counterfactual World Models</text>
  <text x="200" y="293" font-family="Arial, sans-serif" font-size="10" fill="#aaa" text-anchor="middle">Digital Twin-conditioned Video Diffusion</text>
</svg>
