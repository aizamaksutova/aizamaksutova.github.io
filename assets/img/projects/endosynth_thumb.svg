<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" width="400" height="300">
  <rect width="400" height="300" fill="#0d1f0d"/>
  <!-- Multiple synthesized video frames (stacked) -->
  <rect x="230" y="30" width="150" height="100" rx="5" fill="#1a3a2a" stroke="#27ae60" stroke-width="1" opacity="0.5"/>
  <rect x="220" y="40" width="150" height="100" rx="5" fill="#1d4030" stroke="#27ae60" stroke-width="1" opacity="0.65"/>
  <rect x="210" y="50" width="150" height="100" rx="5" fill="#1a5c38" stroke="#2ecc71" stroke-width="1.5"/>
  <!-- Scene content inside top frame -->
  <ellipse cx="285" cy="100" rx="45" ry="30" fill="#3d2b1f" opacity="0.9"/>
  <line x1="235" y1="65" x2="278" y2="98" stroke="#ccc" stroke-width="3" stroke-linecap="round"/>
  <circle cx="278" cy="98" r="4" fill="#aaa"/>
  <!-- Conditioning text -->
  <rect x="20" y="45" width="160" height="95" rx="6" fill="#1a1a0d" stroke="#f0ad4e" stroke-width="1.5"/>
  <text x="100" y="68" font-family="monospace" font-size="9" fill="#f0ad4e" text-anchor="middle" font-weight="bold">Scene Description</text>
  <text x="100" y="86" font-family="monospace" font-size="8" fill="#d4ac0d" text-anchor="middle">"Dissection phase"</text>
  <text x="100" y="100" font-family="monospace" font-size="8" fill="#d4ac0d" text-anchor="middle">"Grasper · scissors"</text>
  <text x="100" y="114" font-family="monospace" font-size="8" fill="#e74c3c" text-anchor="middle">"⚠ Rare: bleeding"</text>
  <!-- Arrow -->
  <line x1="180" y1="92" x2="200" y2="92" stroke="#aaa" stroke-width="2"/>
  <polygon points="197,87 206,92 197,97" fill="#aaa"/>
  <!-- Title bar -->
  <rect x="0" y="255" width="400" height="45" fill="rgba(0,0,0,0.7)"/>
  <text x="200" y="277" font-family="Georgia, serif" font-size="13" fill="white" text-anchor="middle" font-weight="bold">Controllable Surgical Video Synthesis</text>
  <text x="200" y="293" font-family="Arial, sans-serif" font-size="10" fill="#aaa" text-anchor="middle">Routine &amp; Rare OR Events at Scale</text>
</svg>
