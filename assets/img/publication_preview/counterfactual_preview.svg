<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 250" width="400" height="250">
  <rect width="400" height="250" fill="#f0f4f8" rx="8"/>
  <!-- Real video frame (left) -->
  <rect x="30" y="60" width="100" height="70" rx="5" fill="#b8d4f0" stroke="#4a90d9" stroke-width="1.5"/>
  <text x="80" y="98" font-family="monospace" font-size="9" fill="#1a5fa8" text-anchor="middle">Real Video</text>
  <circle cx="65" cy="115" r="10" fill="#1a5fa8" opacity="0.5"/>
  <circle cx="95" cy="110" r="7" fill="#e74c3c" opacity="0.5"/>
  <!-- Digital twin (middle) -->
  <rect x="150" y="55" width="100" height="80" rx="5" fill="#e8f5e9" stroke="#27ae60" stroke-width="1.5"/>
  <text x="200" y="88" font-family="monospace" font-size="9" fill="#1e8449" text-anchor="middle">Digital Twin</text>
  <!-- Simple 3D wireframe box -->
  <polygon points="165,100 195,92 215,100 185,108" fill="none" stroke="#27ae60" stroke-width="1.2"/>
  <polygon points="165,100 165,120 195,112 195,92" fill="none" stroke="#27ae60" stroke-width="1.2"/>
  <polygon points="195,92 215,100 215,120 195,112" fill="none" stroke="#27ae60" stroke-width="1.2"/>
  <!-- Arrow -->
  <line x1="255" y1="95" x2="275" y2="95" stroke="#555" stroke-width="2"/>
  <polygon points="272,90 280,95 272,100" fill="#555"/>
  <!-- Counterfactual output (right) -->
  <rect x="280" y="60" width="100" height="70" rx="5" fill="#fde8e8" stroke="#e74c3c" stroke-width="1.5"/>
  <text x="330" y="88" font-family="monospace" font-size="9" fill="#c0392b" text-anchor="middle">Counterfactual</text>
  <circle cx="315" cy="115" r="10" fill="#e74c3c" opacity="0.4"/>
  <circle cx="345" cy="108" r="7" fill="#e74c3c" opacity="0.7"/>
  <!-- Label -->
  <text x="200" y="175" font-family="Georgia, serif" font-size="12" fill="#2c3e50" text-anchor="middle" font-weight="bold">Counterfactual World Models</text>
  <text x="200" y="193" font-family="Georgia, serif" font-size="10" fill="#666" text-anchor="middle">Digital Twin-conditioned Video Diffusion · arXiv 2511.17481</text>
</svg>
